<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>

Manage Properties

</title>

<link rel="stylesheet" href="style.css">

<style>

body{

font-family:Arial;

padding:30px;

max-width:1400px;

margin:auto;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#009688;

color:white;

padding:12px;

}

td{

padding:12px;

border-bottom:1px solid #ddd;

text-align:center;

}

img{

width:120px;

height:80px;

object-fit:cover;

border-radius:8px;

}

button{

padding:8px 14px;

cursor:pointer;

border:none;

border-radius:8px;

margin:3px;

}

input{

padding:10px;

width:350px;

font-size:16px;

}

</style>

</head>

<body>

<a href="admin.html">

<button>

⬅ Dashboard

</button>

</a>

<h1>

Property Management

</h1>

<input

id="search"

placeholder="Search property..."

onkeyup="loadProperties()">

<table>

<thead>

<tr>

<th>

Image

</th>

<th>

Name

</th>

<th>

District

</th>

<th>

City

</th>

<th>

Type

</th>

<th>

Price

</th>

<th>

Status

</th>

<th>

Views

</th>

<th>

Posted

</th>

<th>

Actions

</th>

</tr>

</thead>

<tbody id="propertyTable">

</tbody>

</table>

<script>

loadProperties();

function loadProperties(){

let table=

document.getElementById(

"propertyTable"

);

table.innerHTML="";

let search=

document.getElementById(

"search"

).value.toLowerCase();

for(

let i=0;

i<localStorage.length;

i++

){

let key=

localStorage.key(i);

try{

let p=

JSON.parse(

localStorage.getItem(key)

);

if(

!p ||

!p.id ||

!p.images

){

continue;

}

let searchable =

(

p.name+" "+

p.city+" "+

p.district+" "+

p.propertyType+" "+

p.status

)

.toLowerCase();

if(

!searchable.includes(search)

){

continue;

}

table.innerHTML += `

<tr>

<td>

<img src="${p.images[0]}">

</td>

<td>

${p.name}

</td>

<td>

${p.district}

</td>

<td>

${p.city}

</td>

<td>

${p.propertyType}

</td>

<td>

${
p.negotiable
?
"💬 Negotiable"
:
"💸 Rs. " + Number(p.price).toLocaleString()
}

</td>

<td>

<span style="

font-weight:bold;

color:

${p.status=="For Sale"?"green":

p.status=="For Rent"?"blue":

"orange"};

">

${p.status}

</span>

</td>

<td>

${p.views || 0}

</td>

<td>

${new Date(p.createdAt).toLocaleDateString()}

</td>

<td>

<button
onclick="viewProperty('${p.id}')">

View

</button>

<button
onclick="editProperty('${p.id}')">

Edit

</button>

<button
onclick="toggleHide('${key}')">

${p.hidden ? "Unhide" : "Hide"}

</button>

<button
onclick="deleteProperty('${key}')">

Delete

</button>

</td>

<td>

${
p.hidden
?
"🔴 Hidden"
:
"🟢 Live"
}

</td>
</tr>

`;

}

catch(e){}

}

}

function deleteProperty(key){

if(

confirm(

"Delete this property?"

)

){

localStorage.removeItem(key);

loadProperties();

}

}

function toggleHide(key){

let property =
JSON.parse(localStorage.getItem(key));

property.hidden =
!property.hidden;

localStorage.setItem(
key,
JSON.stringify(property)
);

loadProperties();

}

function editProperty(id){

localStorage.setItem(

"editProperty",

id

);

window.location.href =
"postproperty.html";

}

function viewProperty(id){

localStorage.setItem(

"selectedProperty",

id

);

window.location.href=

"property.html";

}

</script>

</body>

</html>
