     function loadSimilarProperties(currentProperty){
        document.getElementById("similarHeading").innerHTML =
"More " +
currentProperty.propertyType.toLowerCase() +
"s in " +
currentProperty.city;
        let container= 
        document.getElementById("similarProperties")
        container.innerHTML="";
       let similar = allProperties
       .filter(function(p){
        return p.id !== currentProperty.id &&
        p.propertyType === currentProperty.propertyType;
       })
.map(function(p){

   let score = 100;

// Same City
if(p.city === currentProperty.city){

    score += 60;

}
else if(p.district === currentProperty.district){

    score += 30;

}

// Same Status
if(p.status === currentProperty.status){

    score += 20;

}

// Bedrooms

let bedroomDifference =
Math.abs(
Number(p.bedrooms)-
Number(currentProperty.bedrooms)
);

if(bedroomDifference===0){

    score+=15;

}
else if(bedroomDifference===1){

    score+=8;

}
else if(bedroomDifference===2){

    score+=3;

}

// Bathrooms

let bathroomDifference =
Math.abs(
Number(p.bathrooms)-
Number(currentProperty.bathrooms)
);

if(bathroomDifference===0){

    score+=12;

}
else if(bathroomDifference===1){

    score+=6;

}

// Price

let difference =
Math.abs(
p.price-currentProperty.price
);

let percent =
difference/currentProperty.price;

if(percent<=0.10){

    score+=30;

}
else if(percent<=0.20){

    score+=15;

}
else if(percent<=0.35){

    score+=5;

}

// Land

let perchesDifference =
Math.abs(
p.perches-currentProperty.perches
);

if(perchesDifference<=2){

    score+=8;

}
else if(perchesDifference<=5){

    score+=4;

}

// Building

let sqftDifference =
Math.abs(
p.squareFeet-currentProperty.squareFeet
);

if(sqftDifference<=200){

    score+=8;

}
else if(sqftDifference<=500){

    score+=4;

}

// Amenities

let amenityMatches =
(p.amenities||[]).filter(function(a){

    return (currentProperty.amenities||[])
    .includes(a);

}).length;

score += amenityMatches*2;

// Views

let propertyViewMatches =
(p.propertyView||[]).filter(function(v){

return (currentProperty.propertyView||[])
.includes(v);

}).length;

score += propertyViewMatches*2;

return{

property:p,

score:score

};
})
.sort(function(a,b){

    return b.score-a.score;

})
.filter(function(item){
    return item.score >= 130;
})
.slice(0,5)
.map(function(item){

    return item.property;

});
if(similar.length<5){

let remaining =
allProperties

.filter(function(p){

return p.id!==currentProperty.id &&

p.propertyType===currentProperty.propertyType &&

!similar.some(function(x){

return x.id===p.id;

});

})

.sort(function(a,b){

return (b.views||0)-(a.views||0);

});

for(

let i=0;

i<remaining.length &&

similar.length<5;

i++

){

similar.push(remaining[i]);

}

}
        if(similar.length===0){
            container.innerHTML= 
            "No Similar Properties Found.";
            return;
        }
        similar.forEach(property=>{
            container.innerHTML +=`
            <div
            style="
            position:relative;
            width:260px;
            cursor:pointer;
            border:1px solid #ddd;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,.15);
            transition:.2s;
            ">
            ${(Date.now()-property.createdAt)<604800000?`
<div
style="
position:absolute;
top:10px;
left:10px;
background:#16a34a;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
z-index:5;
">
NEW
</div>
`:""}
            <img
            src="${property.images[0]}"
            onclick="openProperty(${property.id})"
            style="
            width:100%;
            height:200px;
            object-fit:cover;
            ">
            <div 
            style="
            padding:15px;">
            <div
             onclick="
             event.stopPropagation();

            ${property.id},
            this
             );

            style="
            position:absolute;
            top:10px;
            right:10px;
            width:38px;
            height:38px;
            border-radius:50%;
            background:rgba(0,0,0,.45);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:22px;
            cursor:pointer;
            color:white;
            ">
            ${isFavourite(property.id) ? "💗" : "🤍"}
            </div>
            
            <h4>${property.status}</h4>
            <p
style="
font-size:13px;
color:#666;
margin:4px 0 8px 0;
">
📅 Posted:
${timeAgo(property.createdAt)}
</p>
            <h3
            style="cursor:pointer;"
            onclick="openProperty(${property.id})">${property.name}</h3>
            <p>Property Type: ${property.propertyType}</p>
            <p>${property.city}, ${property.district}</p>
            <p>🛏 ${property.bedrooms} Beds | 🛁 ${property.bathrooms} Baths</p>
           ${
property.negotiable
?
"💬 Negotiable"
:
"💸 Rs. "+Number(property.price).toLocaleString()
}
            <p
style="
color:#666;
font-size:14px;
margin-top:6px;
">
👁 ${property.views || 0} Views
</p>
            <button
            onclick="
            event.stopPropagation();openProperty(${property.id});"
         style="
         padding:10px 18px;
         cursor:pointer;
        border:none;
        border-radius:8px;
        font-weight:bold;
        ">
        View Property
        </button>
            </div>
            </div>
            `;
        });
    }
    function togglePropertyFavourite(){
        toggleFavourite(
            currentProperty.id,
            document.getElementById("propertyHeart")
        );
        updatePropertyHeart();
    }
    function toggleFavourite(id, heart){
            let currentUser = 
            localStorage.getItem("currentUser");
            let property = 
            allProperties.find(p => String(p.id) === String(id));
            if(!currentUser){
                alert("Please log in first");
                window.location.href="login.html";
                return;
            }
            let favourites = 
            JSON.parse(
                localStorage.getItem(
                    "favourites_" + currentUser
                ) || "[]"
            );
            if(favourites.includes(String(id))){
                favourites = 
                favourites.filter(
                    x => x !== String(id)
                );
                heart.innerHTML = "🤍";
                heart.style.color = "white";
               showNotification(
                "✔ Removed: " + property.name
               )
            }
            else{
                favourites.push(String(id));
                heart.innerHTML = "💗";
                heart.style.color = "red";
                showNotification(
                "✔ Saved: " + property.name
               )
            }
            localStorage.setItem("favourites_" + currentUser,JSON.stringify(favourites));
            if(favourites.includes(String(id))){

property.saves = Math.max(
0,
(property.saves || 0)-1
);

}
else{

property.saves =
(property.saves || 0)+1;

}

localStorage.setItem(
property.name,
JSON.stringify(property)
);
        }
        function isFavourite(id){
            let currentUser = 
            localStorage.getItem("currentUser");
            if(!currentUser){
                return false;
            }
            let favourites = 
            JSON.parse(
                localStorage.getItem(
                    "favourites_" + currentUser
                ) || "[]"
            );
            return favourites.includes(String(id));
        }
        function updatePropertyHeart(){

    let heart = document.getElementById("propertyHeart");

    if(!heart || !currentProperty){
        return;
    }

    if(isFavourite(currentProperty.id)){
        heart.innerHTML = "💗";
        heart.style.color = "red";
    }else{
        heart.innerHTML = "🤍";
        heart.style.color = "white";
    }
}
    function shareCurrentProperty(){
        shareProperty(currentProperty.id);
    }
    let currentImage = 0;
   function changeImage(index){
    currentImage = index;
    document.getElementById("mainImage").src=
property.images[currentImage]; 
document.getElementById("imageCounter").innerHTML=
(currentImage+1)+" /"+property.images.length;
   for(let i=0;i<property.images.length;i++){
    let 
    thumb=document.getElementById("thumb"+i);
    if(thumb){
        thumb.style.border="2px solid transparent";
    }
   }
   let 
   activeThumb=document.getElementById("thumb"+currentImage);
   if(activeThumb){
    activeThumb.style.border="3px solid #007bff";
   }
   }
   function nextImage(){
    currentImage++;
    if(currentImage >= property.images.length){
        currentImage = 0;
    }
   changeImage(currentImage);
   }
    function previousImage(){
    currentImage--;
    if(currentImage < 0){
        currentImage = 
        property.images.length - 1;
    }
   changeImage(currentImage);
   }
   function openImageViewer(index){

currentImage = index;

updateViewerImage();

document.getElementById("imageViewer").style.display="flex";

document.body.style.overflow="hidden";

}

function closeImageViewer(){

document.getElementById("imageViewer").style.display="none";

document.body.style.overflow="auto";

}

function updateViewerImage(){

document.getElementById("viewerImage").src =
property.images[currentImage];

document.getElementById("viewerCounter").innerHTML =
(currentImage+1)+" / "+property.images.length;

}

function nextViewerImage(){

currentImage++;

if(currentImage>=property.images.length){

currentImage=0;

}

changeImage(currentImage);

updateViewerImage();

}

function previousViewerImage(){

currentImage--;

if(currentImage<0){

currentImage=property.images.length-1;

}

changeImage(currentImage);

updateViewerImage();

}
    function shareProperty(id){
      if(navigator.share){

    navigator.share({
        title:document.title,
        url:window.location.href
    });
   }
    else{
         navigator.clipboard.writeText(window.location.href);
         alert("Property link copied!");
        }
    }
    function showAllImages(){
        let html="";
        property.images.forEach(function(img,index){
            html +=`
            <img
            src="${img}"
            onclick="changeImage(${index});closeGallery();"
            style="

      function timeAgo(date){

    let now = new Date();

    let posted = new Date(date);

    let diff = now - posted;

    let days = Math.floor(diff / (1000*60*60*24));

    if(days === 0){
        return "Today";
    }

    if(days === 1){
        return "Yesterday";
    }

    if(days < 7){
        return days + " days ago";
    }

    if(days < 30){
        return Math.floor(days/7) + " week(s) ago";
    }

    return posted.toLocaleDateString();

      }

 function checkDescriptionLength(){

    let description =
    document.getElementById("propertyDescription");

    let button =
    document.getElementById("readMoreBtn");


    if(!description || !button){
        return;
    }


    if(description.innerText.length > 500){

        button.style.display="block";

    }
    else{

        button.style.display="none";

        description.classList.remove(
            "description-collapsed"
        );

    }

}


function toggleDescription(){

    let description =
    document.getElementById("propertyDescription");

    let button =
    document.getElementById("readMoreBtn");


    if(description.classList.contains(
        "description-collapsed"
    )){

        description.classList.remove(
            "description-collapsed"
        );

        description.classList.add(
            "description-expanded"
        );

        button.innerHTML="Show Less";

    }

    else{

        description.classList.add(
            "description-collapsed"
        );

        description.classList.remove(
            "description-expanded"
        );

        button.innerHTML="Read More";

    }

}
