       <h1
       style="
       text-align: center;">Create Your Account</h1>

<p style="text-align: center;">

Join Gedarak.lk to save favourites,

</p>
       <input 
       type="text"

       placeholder="Choose a Username">

   <script type="module">
    import { auth, db } from "./firebase-config.js";

import {
    createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
    doc,
    getDoc,
    setDoc,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

window.showSignupMessage = function(title,message){

document.getElementById("signupModalTitle").innerHTML = title;

document.getElementById("signupModalMessage").innerHTML = message;

document.getElementById("signupModal").style.display="flex";

};


window.closeSignupModal=function(){

document.getElementById("signupModal").style.display="none";

};

window.signup = async function () {
    console.log("STEP 1");
    let btn = document.getElementById("signupButton");

    btn.disabled = true;
    btn.innerHTML = "Creating...";

    let username = document.getElementById("newUsername").value.trim().toLowerCase();

    let email = document.getElementById("email").value.trim().toLowerCase();

    let password = document.getElementById("newPassword").value;

    let confirmPassword = document.getElementById("confirmPassword").value;

    if (!username || !email || !password || !confirmPassword) {

        showSignupMessage(
"⚠️ Complete Your Account",
"Please fill in all fields before creating your Gedarak.lk account."
);

        btn.disabled = false;
        btn.innerHTML = "Create Account";
        return;
    }

    if (password !== confirmPassword) {

        showSignupMessage(
"🔒 Passwords Don't Match",
"Your password and confirmation password are different. Please check and try again."
);

        btn.disabled = false;
        btn.innerHTML = "Create Account";
        return;
    }

    if (password.length < 6) {

       showSignupMessage(
"🔐 Password Too Short",
"Your password must contain at least 6 characters."
);

        btn.disabled = false;
        btn.innerHTML = "Create Account";
        return;
    }

    const usernameRef = doc(db, "usernames", username);

    const usernameDoc = await getDoc(usernameRef);
console.log("STEP 2");
    if (usernameDoc.exists()) {

        showSignupMessage(
"👤 Username Taken",
"This username is already registered. Please choose another username."
);

        btn.disabled = false;
        btn.innerHTML = "Create Account";
        return;
    }

    try {

        const result = await createUserWithEmailAndPassword(auth, email, password);
console.log("STEP 3");
        const uid = result.user.uid;

        await setDoc(doc(db, "users", uid), {

            uid: uid,

            username: username,

            email: email,

            role: "User",

            status: "Active",

            favourites: [],

            postedProperties: [],

            createdAt: serverTimestamp()

        });

        await setDoc(doc(db, "usernames", username), {

            uid: uid

        });

      showSignupMessage(
"🎉 Welcome to Gedarak.lk",
"Your account has been created successfully."
);

document.querySelector(".signup-modal-btn").onclick=function(){

window.location.href="index.html";

};

    }

   catch (error) {

    if (error.code === "auth/email-already-in-use") {

        showSignupMessage(
        "📧 Email Already Registered",
        "This email is already linked to an account. Please log in instead."
        );

    }

    else if (error.code === "auth/weak-password") {

        showSignupMessage(
        "🔐 Weak Password",
        "Your password is too weak. Please use at least 6 characters."
        );

    }

    else if (error.code === "auth/invalid-email") {

        showSignupMessage(
        "📧 Invalid Email",
        "Please enter a valid email address. Example: name@gmail.com"
        );

    }

    else {

        showSignupMessage(
        "⚠️ Something Went Wrong",
        "Please try again later."
        );

        console.log(error);
    }


    btn.disabled = false;
    btn.innerHTML = "Create Account";

}

    btn.disabled = false;

    btn.innerHTML = "Create Account";

};

window.togglePassword = function () {

    let ids = ["newPassword", "confirmPassword"];

    ids.forEach(id => {

        let input = document.getElementById(id);

        input.type = input.type === "password" ? "text" : "password";

    });

};

document.getElementById("newUsername").focus();

document.addEventListener("keydown", function (e) {

    if (e.key === "Enter") {

        signup();

    }

});
   </script>
