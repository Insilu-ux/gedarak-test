        <style>

font-size:15px;

body{

}

transition:.25s;

}

}

transform:scale(.98);

opacity:.6;

    <body>
         <a href="index.html">

       <header class="pageHeader">

<a href="index.html" class="logoLink">

<img

class="pageLogo">

<div>

<h2>

</a>

    <div class="auth-container">
        <img src="Frame 1.png"
class="logo">
       <h1
       style="
       text-align: center;">Create Your Account</h1>

<p>

Join Gedarak.lk to save favourites,
post properties and contact sellers.

</p>
       <input 
       type="text"
       id="newUsername"
       placeholder="Choose a Username">
       <br></br>

<input

type="email"

id="email"

placeholder="Enter your Email">
<br><br>
       <input 
       type="password"
       id="newPassword"
       placeholder="Password">
       <br><br>
       <p id="caps"></p>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">
       <br><br>
  <p id="passwordStrength"></p>

<div class="show-password">
    <label>
        <input
        type="checkbox"
        onclick="togglePassword()">
        Show Password
    </label>
</div>

<br>
      <button

id="signupButton"
class="authButton"
onclick="signup()">
      Create Account
    </button>

    <script>
        function signup(){
                    let btn=

document.getElementById("signupButton");

btn.disabled=true;

btn.innerHTML="Creating...";
           let username=

document.getElementById(

"newUsername"

).value

.trim()

.toLowerCase();
             let password=
            document.getElementById(
                "newPassword"
            ).value;
            let confirmPassword=
document.getElementById(
"confirmPassword"
).value;
let email=

document.getElementById(

"email"

).value.trim();
           if(

username.trim()=="" ||

password.trim()=="" ||

confirmPassword.trim()==""

){

alert(

"Please fill all fields."

);
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}

if(password.length<4){

alert("Password must contain at least 4 characters.");

btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
if(password!==confirmPassword){

alert("Passwords do not match.");

btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
if(

!email.includes("@")||

!email.includes(".")

){

alert("Invalid email.");
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
if(

username.length<3

){

alert(

"Username must contain at least 3 characters."

);
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
let usernamePattern=/^[a-zA-Z0-9_]+$/;

if(

!usernamePattern.test(username)

){

alert(

"Username can only contain letters, numbers and _"

);
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
           let user={

id:"USER"+Date.now(),

username:username,

password:password,

email:email,

role:"User",

createdAt:new Date().toISOString(),

savedProperties:[],

postedProperties:[],

status:"Active"

}
if(

localStorage.getItem(

"user_"+username

)

){

alert(

"Username already exists."

);
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}
for(

let i=0;

i<localStorage.length;

i++

){

let key=

localStorage.key(i);

if(key.startsWith("user_")){

let u=

JSON.parse(

localStorage.getItem(key)

);

if(

u.email===email

){

alert(

"Email already registered."

);
btn.disabled=false;

btn.innerHTML="Create Account";

return;

}

}

}


            localStorage.setItem(
"user_" + username,
JSON.stringify(user)
);
           localStorage.setItem(

"loggedIn",

"true"

);

localStorage.setItem(

"currentUser",

username

);

alert(

"Welcome to Gedarak.lk!"

);

window.location.href=

"index.html";
        }
        function togglePassword(){


let newPassword=

document.getElementById(

"newPassword"

);

if(newPassword){

newPassword.type=

newPassword.type=="password"

?

"text"

:

"password";

}
let confirmPassword =

document.getElementById(

"confirmPassword"

);

if(confirmPassword){

confirmPassword.type=

confirmPassword.type=="password"

?

"text"

:

"password";

}
}
document.getElementById(

"newPassword"

).addEventListener(

"input",

function(){

let p=this.value;

let strength="Weak";

if(

p.length>=8

){

strength="Medium";

}

if(

p.length>=10 &&

/[A-Z]/.test(p)&&

/[0-9]/.test(p)

){

strength="Strong";

}

});
let strength=document.getElementById("passwordStrength");

document.getElementById("newPassword")
.addEventListener("input",function(){

let p=this.value;

strength.className="";

if(p.length<4){

strength.innerHTML="Weak Password";

strength.classList.add("weak");

}

else if(p.length<8){

strength.innerHTML="Good Password";

strength.classList.add("medium");

}

else{

strength.innerHTML="Strong Password";

strength.classList.add("strong");

}

});

document.addEventListener(

"keydown",

function(event){

if(event.key==="Enter"){

signup();

}

});
document.getElementById("newUsername").focus();
    </script>
