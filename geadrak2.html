.contact-btn{

.skeleton{

);

Post Property
</button>

</div>

</header>

<section class="hero">

<h2>Find Your Perfect Property</h2>

<div class="searchBar">

<input
type="text"
id="searchInput"
placeholder="Search by City, District, Address">

Search
</button>

<button id="filterBtn">
Filters
</button>

<select id="sortFilter">

<option value="newest">
Newest
</option>

<option value="priceLow">
Price Low
</option>

<option value="priceHigh">
Price High
</option>

<option value="views">
Most Viewed
</option>

</select>

</div>

<button>All</button>

<button>Apartments</button>

<button>Homes</button>

<button>Lands</button>

<button>Others</button>

<button>Rentals</button>

</div>

</section>

<section class="latest-properties">

    <div class="section-header">

        <div>

            <h2>Latest Properties</h2>

            <p>Fresh properties uploaded across Sri Lanka.</p>

        </div>

        <div class="property-controls">

            <select id="sortFilter">

                <option value="newest">Newest</option>
                <option value="priceLow">Price Low → High</option>
                <option value="priceHigh">Price High → Low</option>
                <option value="views">Most Viewed</option>

            </select>

        </div>

    </div>

    <main class="property-section">
    <div id="resultCount" class="result-count">

0 Properties Found

</div>
    <div id="propertyGrid" class="property-grid">

        <!-- Properties from backend -->

    </div>
    <div id="pagination"></div>
    <div id="loadingBox" class="loading-box">

        Loading properties...

    </div>

    <div id="noResults" class="no-results">

        No properties found.

    </div>

</main>

</section>

></textarea>

</div>
