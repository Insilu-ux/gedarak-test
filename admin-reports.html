<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>

Manage Reports

</title>

<link rel="stylesheet" href="style.css">

<style>

body{

font-family:Arial;

padding:30px;

max-width:1400px;

margin:auto;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#009688;

color:white;

padding:12px;

}

td{

padding:12px;

border-bottom:1px solid #ddd;

vertical-align:top;

}

button{

padding:8px 15px;

border:none;

cursor:pointer;

border-radius:8px;

margin:2px;

}

textarea{

width:100%;

}

</style>

</head>

<body>

<a href="admin.html">

<button>

⬅ Dashboard

</button>

</a>

<h1>

Reports

</h1>

<input

id="searchReport"

placeholder="Search reports..."

onkeyup="loadReports()">

<br><br>

<select

id="statusFilter"

onchange="loadReports()">

<option value="">

All Reports

</option>

<option>

Pending

</option>

<option>

Solved

</option>

</select>

<br><br>
<table>

<thead>

<tr>

<th>Name</th>

<th>Problem</th>

<th>Property</th>

<th>Date</th>

<th>Screenshot</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="reportTable">

</tbody>

</table>

<script>

loadReports();

function loadReports(){

let reports=

JSON.parse(

localStorage.getItem("reports")||

"[]"

);

let search=

document.getElementById(

"searchReport"

).value.toLowerCase();

let status=

document.getElementById(

"statusFilter"

).value;

let table=

document.getElementById("reportTable");

table.innerHTML="";

reports.forEach(function(report,index){

    let searchable=(

report.name+" "+

report.email+" "+

report.type+" "+

report.property+" "+

report.message

).toLowerCase();

if(

!searchable.includes(search)

){

return;

}

if(

status!="" &&

(report.status || "Pending")!=status

){

return;

}

table.innerHTML+=`

<tr>

<td>

<div
style="
max-width:180px;
max-height:70px;
overflow:auto;
font-weight:bold;
word-break:break-word;
">

${report.name}

</div>

<br>

<div
style="
word-break:break-word;
">

${report.email}

</div>

</td>

<td>

<span

style="

padding:6px 10px;

border-radius:8px;

font-weight:bold;

background:

${report.type=="Scam / Fraud"

?"#ffb3b3":

report.type=="Bug / Error"

?"#ffe599":

report.type=="Suggestion"

?"#b6d7ff":

"#dddddd"};

">

${report.type}

</span>

<br><br>

<div
style="
max-height:170px;
overflow-y:auto;
padding:8px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
white-space:pre-wrap;
word-break:break-word;
">

${report.message}

</div>

</td>

<td>

${report.property || "-"}

<br><br>

<button

onclick="findProperty('${report.property}')">

Open

</button>

</td>

<td>

${report.date}

</td>


<td>

${report.image ?

`
<img

src="${report.image}"

onclick="openImage('${report.image}')"

style="
width:90px;
height:70px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
border:1px solid #ccc;
">

`

:

"No Image"

}

</td>

<td>

<span
style="
font-weight:bold;
color:
${report.status=="Solved" ? "green" : "red"};
">

${report.status || "Pending"}

</span>

</td>

<td>

<button

onclick="solveReport(${index})">

✔ Mark Solved

</button>

<button
onclick="deleteReport(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

function solveReport(index){

let reports=

JSON.parse(

localStorage.getItem("reports")

);

reports[index].status="Solved";

localStorage.setItem(

"reports",

JSON.stringify(reports)

);

loadReports();



}

function deleteReport(index){

if(confirm("Delete report?")){

let reports=

JSON.parse(

localStorage.getItem("reports")

);

reports.splice(index,1);

localStorage.setItem(

"reports",

JSON.stringify(reports)

);

loadReports();

}

}

function findProperty(name){

for(

let i=0;

i<localStorage.length;

i++

){

let key=

localStorage.key(i);

try{

let property=

JSON.parse(

localStorage.getItem(key)

);

if(

property &&

property.name==name

){

localStorage.setItem(

"selectedProperty",

property.id

);

window.location.href=

"property.html";

return;

}

}catch(e){}

}

alert(

"Property not found."

);

}

function openImage(src){

document.getElementById(
"popupImage"
).src = src;

document.getElementById(
"imagePopup"
).style.display="flex";

}

function closeImage(){

document.getElementById(
"imagePopup"
).style.display="none";

}
let zoomed = false;

function zoomImage(){

let image =
document.getElementById("popupImage");

if(!zoomed){

image.style.transform = "scale(2)";
image.style.cursor = "zoom-out";

zoomed = true;

}
else{

image.style.transform = "scale(1)";
image.style.cursor = "zoom-in";

zoomed = false;

}

}
</script>

<div

id="imagePopup"
onclick="closeImage()"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.88);
justify-content:center;
align-items:center;
z-index:99999;
transition:.25s;
cursor:zoom-in;
">

<img
id="popupImage"

onclick="
event.stopPropagation();
zoomImage();
"

style="
width:auto;
height:auto;

width:95vw;
height:95vh;


object-fit:contain;

border-radius:12px;

box-shadow:0 0 40px rgba(255,255,255,.35);
">

<div

onclick="closeImage()"

style="
position:absolute;
top:25px;
right:35px;
font-size:42px;
color:white;
cursor:pointer;
font-weight:bold;
">

×

</div>

</div>

</body>

</html>
