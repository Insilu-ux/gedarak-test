<!DOCTYPE html>
<html>
    <head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="style.css">
<style>
body{

margin:0;

background:#f4f6f8;

font-family:Arial,sans-serif;

}

.auth-container{

max-width:430px;

margin:30px auto;

background:white;

padding:35px;

border-radius:14px;

box-shadow:0 3px 18px rgba(0,0,0,.12);

}

.logo{

width:90px;

display:block;

margin:auto;

margin-bottom:20px;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:25px;

line-height:1.5;

}

input{

width:100%;

padding:14px;

font-size:16px;

border-radius:8px;

border:1px solid #ccc;

box-sizing:border-box;

margin-bottom:15px;

}
.login-btn{

width:100%;

padding:14px;

font-size:17px;

font-weight:bold;

background:#0d8ae8;

color:white;

border:none;

border-radius:8px;

cursor:pointer;

transition:.25s;

}

.login-btn:hover{

background:#0a6fbd;

transform:translateY(-2px);

}

.login-btn:active{

transform:scale(.98);

}

.login-btn:disabled{

opacity:.6;

cursor:not-allowed;

}


button:hover{

background:#0a6fbd;

}



footer{

text-align:center;

margin-top:50px;

padding:25px;

font-size:15px;

}

h1{

text-align:center;

margin-bottom:10px;

}

.show-password{

margin:5px 0 20px;

}

.show-password label{

display:flex;

align-items:center;

gap:8px;

cursor:pointer;

font-size:15px;

}

.show-password input{

width:auto;

margin:0;

}

@media(max-width:600px){
    h1{

font-size:30px;

}

.subtitle{

font-size:15px;

}

.auth-container{

margin:10px;

margin-top:15px;

padding:22px;

}
input{

padding:16px;

font-size:17px;

}



}
.auth-links{

text-align:center;

margin-top:25px;

line-height:2;

font-size:16px;

}

.auth-links a{

font-weight:bold;

text-decoration:none;

color:#0d8ae8;

}

.auth-links a:hover{

text-decoration:underline;

}
.pageHeader{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:30px;

padding-bottom:15px;

border-bottom:1px solid #ddd;

}

.logoLink{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

color:black;

}

.pageLogo{

width:55px;

height:55px;

object-fit:contain;

}

.logoLink h2{

margin:0;

font-size:32px;

font-weight:bold;

color:#8b008b;

}

@media(max-width:600px){

.pageLogo{

width:42px;

height:42px;

}

.logoLink h2{

font-size:24px;

}
.logo{

width:75px;

}

}
.tagline{

margin:0;

font-size:14px;

color:#666;

}
input:focus{

outline:none;

border:1px solid #0d8ae8;

box-shadow:0 0 5px rgba(13,138,232,.3);

}
.login-modal{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.45);

display:none;

align-items:center;
justify-content:center;

z-index:999999;

}


.login-modal-box{

background:white;

width:90%;

max-width:420px;

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.3);

animation:loginPopup .25s ease;

}


.login-modal-box h2{

margin:0 0 15px;

font-size:26px;

}


.login-modal-box p{

font-size:17px;

line-height:1.6;

color:#444;

}


.login-modal-btn{

margin-top:20px;

padding:12px 35px;

border:none;

border-radius:12px;

background:#0d8ae8;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

}


.login-modal-btn:hover{

transform:translateY(-2px);

}


@keyframes loginPopup{

from{

transform:scale(.8);
opacity:0;

}

to{

transform:scale(1);
opacity:1;

}

}
</style>

</head>
    <body>
        <a href="index.html">
        <button class="home-btn">
        💒 Home
        </button>
    </a>

<div class="login-modal" id="loginModal">

<div class="login-modal-box">

<h2 id="loginModalTitle"></h2>

<p id="loginModalMessage"></p>

<button 
class="login-modal-btn"
onclick="closeLoginModal()">

OK

</button>

</div>

</div>
          <header class="pageHeader">

<a href="index.html" class="logoLink">

<img
src="Frame 1.png"
class="pageLogo">

<div>

<h2>

Gedarak.lk

</h2>

<p class="tagline">

Sri Lanka's Property Marketplace

</p>

</div>

</a>

</header>
<div class="auth-container">

<img src="Frame 1.png" class="logo">

<h1>Welcome Back</h1>

<p class="subtitle">
Login to save favourites, manage your listings and contact sellers.
</p>
       <input
type="email"
id="email"
placeholder="Enter Email">
    
       <input 
       type="password"
       id="password"
       placeholder="Enter Password">
   
       <div class="show-password">

<label>

<input

type="checkbox"

onclick="togglePassword()">

Show Password

</label>

</div>
       
       <button

id="loginButton"
class="login-btn"
onclick="login()">
       Login
    </button>
   
  
   <div class="auth-links">

Don't have an account?

<a href="signup.html">

Create Account

</a>

<br>

<a href="forgotpassword.html">

Forgot Password?

</a>

</div>
</div>
      <footer>
        <h3>Gedarak.lk</h3>
        <p>Find your dream property</p>

        <p>&copy; 2026 Gedarak.lk</p>
      </footer>
   <script type="module">
   import { auth, db } from "./firebase-config.js";

import {
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

import {
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";


window.showLoginMessage=function(title,message){

document.getElementById("loginModalTitle").innerHTML=title;

document.getElementById("loginModalMessage").innerHTML=message;

document.getElementById("loginModal").style.display="flex";

};


window.closeLoginModal=function(){

document.getElementById("loginModal").style.display="none";

};



window.login = async function(){

const btn=document.getElementById("loginButton");


btn.disabled=true;

btn.innerHTML="Logging you in...";


const email=document.getElementById("email").value.trim().toLowerCase();

const password=document.getElementById("password").value;



if(email==="" || password===""){


showLoginMessage(
"⚠️ Missing Details",
"Please enter both your email address and password."
);


btn.disabled=false;

btn.innerHTML="Login";

return;

}



const emailPattern=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;


if(!emailPattern.test(email)){


showLoginMessage(
"📧 Invalid Email",
"Please enter a valid email address. Example: name@gmail.com"
);


btn.disabled=false;

btn.innerHTML="Login";

return;

}



try{


const result=await signInWithEmailAndPassword(
auth,
email,
password
);



const uid=result.user.uid;


const userRef=doc(db,"users",uid);


const userSnap=await getDoc(userRef);



if(!userSnap.exists()){


showLoginMessage(
"⚠️ Profile Missing",
"Your authentication exists, but your Gedarak.lk profile could not be found."
);


btn.disabled=false;

btn.innerHTML="Login";

return;

}



const user=userSnap.data();



if(user.status==="Banned"){


showLoginMessage(
"🚫 Account Suspended",
"This account has been suspended. Please contact Gedarak.lk support."
);


btn.disabled=false;

btn.innerHTML="Login";

return;

}



showLoginMessage(
"🎉 Welcome Back",
"You have successfully logged into Gedarak.lk."
);



document.querySelector(".login-modal-btn").onclick=function(){

window.location.href="index.html";

};



}


catch(error){



if(
error.code==="auth/invalid-credential" ||
error.code==="auth/user-not-found" ||
error.code==="auth/wrong-password"
){


showLoginMessage(
"🔐 Login Failed",
"Incorrect email or password. Please check your details and try again."
);


}


else if(error.code==="auth/invalid-email"){


showLoginMessage(
"📧 Invalid Email",
"Please enter a valid email address."
);


}


else{


showLoginMessage(
"⚠️ Something Went Wrong",
"Please try again later."
);


console.log(error);


}



}


btn.disabled=false;

btn.innerHTML="Login";


};



window.togglePassword=function(){


const input=document.getElementById("password");


input.type=
input.type==="password"
?"text"
:"password";


};



document.addEventListener("keydown",function(e){

if(e.key==="Enter"){

login();

}

});


document.getElementById("email").focus();
   </script>
    </body>
</html>
