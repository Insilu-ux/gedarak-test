<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{

font-family:Arial;

padding:30px;

max-width:1200px;

margin:auto;

}

.dashboard{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;

margin-bottom:40px;

}

.card{

background:white;

border-radius:12px;

padding:30px;

text-align:center;

box-shadow:0 3px 12px rgba(0,0,0,.15);

}

.card h2{

font-size:40px;

margin:0;

}

.admin-buttons{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-top:30px;

}

.admin-buttons button{

padding:20px;

font-size:18px;

cursor:pointer;

border:none;

border-radius:10px;

}
        </style>
    </head>
   <body>

<a href="index.html">

<button class="home-btn">

💒 Home

</button>

</a>

<h1>

Gedarak.lk Admin Dashboard

</h1>

<div class="dashboard">

<div class="card">

<h2 id="totalProperties">

0

</h2>

<p>🏠 Total Properties</p>

</div>

<div class="card">

<h2 id="liveProperties">

0

</h2>

<p>👀 Live Listings</p>

</div>

<div class="card">

<h2 id="totalReports">

0

</h2>

<p>🚩 Reports</p>

</div>

<div class="card">

<h2 id="totalUsers">

0

</h2>

<p>👤 Users</p>

</div>

</div>

<hr>

<h2>

Management

</h2>

<div class="admin-buttons">

<button onclick="location.href='admin-properties.html'">

🏠 Properties

</button>

<button onclick="location.href='admin-reports.html'">

🚩 Reports

</button>


</div>

<script>

updateDashboard();

function updateDashboard(){

let properties=0;

let live=0;

let users=0;

for(

let i=0;

i<localStorage.length;

i++

){

let key=

localStorage.key(i);

try{

let item=

JSON.parse(localStorage.getItem(key));

if(
item &&
item.username &&
item.password
){
    users++;
}

if(item){

if(item.id){

    properties++;

    if(

        item.hidden !== true &&

        item.approved !== false

    ){

        live++;

    }

}

}

}catch(e){}

}

let reports=

JSON.parse(

localStorage.getItem("reports")||"[]"

);

document.getElementById(

"totalReports"

).innerHTML=

reports.length;

document.getElementById(

"totalProperties"

).innerHTML=

properties;

document.getElementById(

"liveProperties"

).innerHTML=

live;

document.getElementById(
"totalUsers"
).innerHTML =
users;

}

</script>

</body>
</html>
