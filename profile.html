<!DOCTYPE html>
<html>
        <head>
            <meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:30px;

}
.card{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 3px 12px rgba(0,0,0,.12);

text-align:center;

transition:.3s;

}
.card:hover{

transform:translateY(-5px);

}
.card h1{

font-size:42px;

margin:12px 0 0 0;

font-weight:700;

color:#0077ff;

}
.card h3{

margin:0;

font-size:19px;

font-weight:600;

}
body{

max-width:1100px;

margin:auto;

padding:20px;

font-family:Arial,sans-serif;

}
.quickActions{

display:flex;

flex-wrap:wrap;

gap:15px;

margin-top:20px;

}
           .pageHeader{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:30px;

padding-bottom:15px;

border-bottom:1px solid #ddd;

}

.logoLink{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

color:black;

}

.pageLogo{

width:55px;

height:55px;

object-fit:contain;

}

.logoLink h2{

margin:0;

font-size:32px;

font-weight:bold;

color:#8b008b;

}

@media(max-width:600px){

body{

padding:12px;

}

.pageHeader{

margin-bottom:20px;

padding-bottom:12px;

}

.pageLogo{

width:42px;

height:42px;

}

.logoLink h2{

font-size:23px;

}

.tagline{

font-size:13px;

}

h1{

font-size:28px;

}

h2{

font-size:22px;

}

.dashboard{

grid-template-columns:1fr;

gap:15px;

}

.card{

padding:18px;

}

.card h1{

font-size:34px;

}

.card h3{

font-size:18px;

}

.quickActions{

flex-direction:column;

}

.quickActions a{

width:100%;

}

.quickActions button{

width:100%;

font-size:17px;

padding:14px;

}

footer{

font-size:15px;

line-height:1.8;

}

}
.quickActions button{

padding:13px 22px;

font-size:17px;

border:none;

border-radius:10px;

cursor:pointer;

transition:.25s;

}

.quickActions button:hover{

transform:translateY(-2px);

}
#joinedDate{

font-size:18px;

color:#666;

margin-bottom:25px;

}
        </style>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

</a>

</header>

style="

font-size:30px;

">

</h2>

<hr>

style="

            <script>
            let user=
            localStorage.getItem(
                "currentUser"
            );
            let listings=0;
let totalViews=0;
let totalSaves=0;
let totalMessages=0;
let enquiries =

JSON.parse(

localStorage.getItem("enquiries")

|| "[]"

);
           if(user){

document.getElementById("userName").innerHTML =
"Welcome back,<br>" + user;

}else{

document.getElementById("userName").innerHTML =
"Welcome back";

}
           for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

try{

let property=
JSON.parse(localStorage.getItem(key));

if(
property &&
String(property.owner).trim().toLowerCase() ===
String(user).trim().toLowerCase()
){

listings++;

totalViews += property.views || 0;



}

}
catch(e){}

}
// USER'S TOTAL SAVED PROPERTIES
let mySavedProperties =
JSON.parse(
    localStorage.getItem(
        "favourites_" + user
    ) || "[]"
);

totalSaves = mySavedProperties.length;

enquiries.filter(function(item){

return String(item.owner).trim().toLowerCase() ===
String(user).trim().toLowerCase();

}).length;

            document.getElementById("listingCount").innerText=
listings;

document.getElementById("totalViews").innerText=
totalViews.toLocaleString();

document.getElementById("totalSaves").innerText=
totalSaves.toLocaleString();



let joined =

localStorage.getItem(

"joined_"+user

);

if(!joined){

joined =

new Date().toLocaleDateString();

localStorage.setItem(

"joined_"+user,

joined

);

}

document.getElementById("joinedDate").innerHTML =

"📅 Member since " + joined;
             function logout(){
                if(

!confirm(

"You sure you want to Log Out?"

)

){

return;

}
                localStorage.removeItem(
                    "loggedIn"
                );
                localStorage.removeItem(
                    "currentUser"
                );
                alert(
                    "Logged out"
                );
              window.location.href=
              "login.html";
            }
        </script>
