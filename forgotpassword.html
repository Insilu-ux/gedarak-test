<!DOCTYPE html>

<html>

<head>
        <meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{

font-family:Arial,sans-serif;

max-width:430px;

margin:auto;

padding:25px;

}

h1{

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#666;

margin-bottom:25px;

line-height:1.5;

}

input{

width:100%;

padding:14px;

font-size:16px;

box-sizing:border-box;

}

#recoverBtn{

width:100%;
padding:14px;
font-size:17px;
font-weight:bold;
background:#0d8ae8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:.25s;

}

#recoverBtn:hover{

background:#0a6fbd;
transform:translateY(-2px);

}

#recoverBtn:disabled{

opacity:.6;
cursor:not-allowed;

}
.home-btn{

width:auto;
padding:8px 18px;
font-size:15px;
background:white;
color:#0d8ae8;
border:1px solid #0d8ae8;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;

}

.home-btn:hover{

background:#0d8ae8;
color:white;

}
#result{

margin-top:25px;

padding:15px;

border-radius:8px;

font-size:15px;

line-height:1.6;

}

.success{

background:#e9f8ed;

color:#0f6d2d;

border:1px solid #69c27c;

}

.error{

background:#ffecec;

color:#b00020;

border:1px solid #ff9d9d;

}
        .pageHeader{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:30px;

padding-bottom:15px;

border-bottom:1px solid #ddd;

}

.logoLink{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

color:black;

}

.pageLogo{

width:55px;

height:55px;

object-fit:contain;

}

.logoLink h2{

margin:0;

font-size:32px;

font-weight:bold;

color:#8b008b;

}

@media(max-width:600px){

.pageLogo{

width:42px;

height:42px;

}

.logoLink h2{

font-size:24px;

}

}
.tagline{

margin:0;

font-size:14px;

color:#666;

}
    </style>

<title>Forgot Password</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
   <header class="pageHeader">

<a href="index.html" class="logoLink">

<img
src="Frame 1.png"
class="pageLogo">

<div>

<h2>

Gedarak.lk

</h2>

<p class="tagline">

Sri Lanka's Property Marketplace

</p>

</div>

</a>

</header>
<a href="login.html">

<button class="home-btn">

← Back

</button>

</a>

<h1>Reset Your Password</h1>

<p class="subtitle">
Enter the email address associated with your account.
If an account exists, we'll help you reset your password.
</p>

<input
type="email"
id="email"
placeholder="Enter your email address"
autocomplete="email">

<br><br>

<button
id="recoverBtn"
onclick="recoverPassword()">

Continue

</button>

<br><br>

<div id="result"></div>

<script type="module">
        import { auth } from "./firebase-config.js";

import {
    sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

window.recoverPassword = async function () {

    const btn = document.getElementById("recoverBtn");

    const result = document.getElementById("result");

    btn.disabled = true;
    btn.innerHTML = "Sending...";

    result.innerHTML = "";
    result.className = "";

    const email = document
        .getElementById("email")
        .value
        .trim()
        .toLowerCase();

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (!emailPattern.test(email)) {

    result.classList.add("error");

    result.innerHTML =
    "📧 Please enter a valid email address. Example: name@gmail.com";

    btn.disabled = false;
    btn.innerHTML = "Continue";

    return;
}

    try {

        await sendPasswordResetEmail(auth, email);

        result.classList.add("success");

        result.innerHTML =
        "✅ Password reset email has been sent.<br><br>Please check your inbox and spam folder.";

    }

    catch (error) {

        result.classList.add("error");

        if (
            error.code === "auth/user-not-found" ||
            error.code === "auth/invalid-credential"
        ) {

          result.innerHTML =
"📧 If an account exists with this email, you will receive a password reset link. Please check your inbox and spam folder.";
        }

        else if (
            error.code === "auth/invalid-email"
        ) {

            result.innerHTML =
            "Invalid email address.";

        }

        else {

            result.innerHTML =
            error.message;

        }

    }

    btn.disabled = false;
    btn.innerHTML = "Continue";

};

document.addEventListener("keydown", function(e){

    if(e.key==="Enter"){

        recoverPassword();

    }

});

document.getElementById("email").focus();
</script>

</body>

</html>
