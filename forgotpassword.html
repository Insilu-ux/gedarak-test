<h1>Reset Your Password</h1>

<p class="subtitle">
Enter the email address associated with your account.
If an account exists, we'll help you reset your password.
</p>

<input
type="email"
id="email"
placeholder="Enter your email address"
autocomplete="email">

<br><br>

<button
id="recoverBtn"
onclick="recoverPassword()">

Continue

</button>

<br><br>

<div id="result"></div>

<footer style=" 
text-align: center;">
        <h3>Gedarak.lk</h3>
        <p>Find your dream property</p>
       <p>

Email:

<a href="mailto:gedarak.lk@gmail.com">

gedarak.lk@gmail.com

</a>

</p>
        <p>Phone: +94 771 234 567</p>
        <p>&copy; 2026 Gedarak.lk</p>
      </footer>
<script>

function recoverPassword(){

let btn=
document.getElementById("recoverBtn");

btn.disabled=true;

btn.innerHTML="Checking...";

let email=
document.getElementById("email")
.value
.trim()
.toLowerCase();

let result=
document.getElementById("result");

result.className="";
result.innerHTML="";

if(email==""){

result.classList.add("error");

result.innerHTML=
"Please enter your email address.";

btn.disabled=false;

btn.innerHTML="Continue";

return;

}

let found=false;

for(

let i=0;

i<localStorage.length;

i++

){

let key=
localStorage.key(i);

if(key.startsWith("user_")){

let user=
JSON.parse(
localStorage.getItem(key)
);

if(

user.email.toLowerCase()==email

){

found=true;

break;

}

}

}

if(found){

result.classList.add("success");

result.innerHTML=

"✅ Account found.<br><br>After Gedarak.lk launches, a password reset link will be sent to this email address.";

}

else{

result.classList.add("error");

result.innerHTML=

"❌ No account was found using this email address.";

}

btn.disabled=false;

btn.innerHTML="Continue";

}

document.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

recoverPassword();

}

});

document.getElementById("email").focus();

</script>

</body>
